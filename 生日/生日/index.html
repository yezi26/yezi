<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日祝福</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #232526 50%, #39127c 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            cursor: pointer;
            position: relative;
        }

        /*   新增：彩屑飘落效果 */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--color);
            border-radius: 50%;
            opacity: 0.8;
            animation: confetti-fall linear infinite;
            z-index: 2;
        }

        /*   新增：漂浮气球 */
        .balloon {
            position: absolute;
            width: 60px;
            height: 80px;
            background: var(--balloon-color);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            animation: balloon-float ease-in-out infinite;
            z-index: 2;
        }

        .balloon::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 20px;
            background: #fff;
        }

        .balloon::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 10px;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
        }

        /*   新增：生日蛋糕容器 + 动画 */
        .cake-container {
            margin: 10px 0;
            animation: cake-pulse 2s ease-in-out infinite;
            z-index: 10;
            position: relative;
            text-align: center;
        }

        .cake {
            font-size: clamp(60px, 12vw, 100px);
            transform: rotate(-5deg);
            text-shadow: 0 0 10px #ffeb3b, 0 0 20px #ffc107;
        }

        /*   新增：生日帽装饰 */
        .birthday-cap {
            position: absolute;
            top: 50px;
            right: 50px;
            font-size: 60px;
            transform: rotate(15deg);
            animation: cap-spin 8s ease-in-out infinite alternate;
            z-index: 2;
        }

        /* 点击提示层 */
        #playTip {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            z-index: 200;
            text-align: center;
            padding: 20px;
            backdrop-filter: blur(5px);
        }

        /* 主内容区 */
        #birthdayContent {
            display: none;
            text-align: center;
            z-index: 10;
            opacity: 0;
            transition: opacity 1s ease;
            position: relative;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            max-width: 80vw;
            /* 核心：手机端最多占屏幕90%宽度 */
            width: 100%;
            max-width: 600px;
            margin: 0 auto;

        }

        /*   新增：文字发光+脉冲动画 */
        h1 {
            font-size: clamp(32px, 8vw, 60px);
            margin-bottom: 10px;
            text-shadow: 0 0 15px #ff4081, 0 0 30px #ff4081;
            animation: text-glow 2s ease-in-out infinite alternate;
            line-height: 1.1;
        }

        .countdown {
            font-size: 4vw;
            margin: 15px 0;
            text-shadow: 0 0 10px #fff;
            line-height: 1.4;
        }

        .photo {
            width: 50vw;
            height: 50vw;
            max-width: 200px;
            /* 大屏上不超过200px */
            max-height: 200px;
            border-radius: 50%;
            border: 5px solid #fff;
            margin: 15px auto;
            /* 让照片在手机上居中 */
            object-fit: cover;
            box-shadow: 0 0 20px rgba(255, 64, 129, 0.8);
        }

        .photo:hover {
            transform: scale(1.05);
        }

        .blessing {
            font-size: 3.5vw;
            line-height: 1.5;
            margin: 10px 0;
            text-shadow: 0 0 8px #fff;
        }

        /* 烟花画布 */
        #fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            mix-blend-mode: screen;
            opacity: 0.9;
        }

        /* 隐藏音频控件 */
        audio {
            display: none;
        }

        /*   新增：动画关键帧 */
        @keyframes confetti-fall {
            0% {
                transform: translateY(-10px) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        @keyframes balloon-float {

            0%,
            100% {
                transform: translateY(0) translateX(0) rotate(-2deg);
            }

            50% {
                transform: translateY(-30px) translateX(15px) rotate(2deg);
            }
        }

        @keyframes cake-pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }

        @keyframes text-glow {
            0% {
                text-shadow: 0 0 15px #ff4081, 0 0 30px #ff4081;
            }

            100% {
                text-shadow: 0 0 20px #ff4081, 0 0 40px #ff4081, 0 0 60px #ff4081;
            }
        }

        @keyframes cap-spin {
            0% {
                transform: rotate(15deg) scale(1);
            }

            100% {
                transform: rotate(25deg) scale(1.1);
            }
        }
    </style>
</head>

<body>
    <!-- 点击提示层 -->
    <div id="playTip">🎂 点击屏幕开始播放生日祝福 🎂</div>

    <!--   新增：生日帽 -->
    <div class="birthday-cap">🎩</div>

    <!-- 主内容区 -->
    <div id="birthdayContent">
        <h1 id="nameTitle">林杰同学 生日快乐！</h1>

        <!--   新增：动态蛋糕 -->
        <div class="cake-container">
            <div class="cake">🎂</div>
        </div>

        <div class="countdown" id="countdownText">距离生日还有：0 天 0 时 0 分 0 秒</div>
        <img src="birthday_photo.jpg" alt="寿星照片" class="photo"
            onerror="this.src='https://img.icons8.com/fluency/200/000000/cake.png'">
        <div class="blessing">
            愿你平安喜乐，万事顺意<br>
            岁岁无忧，年年皆胜意<br>
            --这张照片整理相册的时候看到的
        </div>
    </div>

    <!-- 烟花画布 -->
    <canvas id="fireworks"></canvas>

    <!-- 音频标签：背景音乐（循环）+ 录音（单次） -->
    <audio id="backgroundMusic" preload="auto" loop>
        <source src="background_music.mp3" type="audio/mpeg">
    </audio>
    <audio id="birthdayAudio" preload="auto">
        <source src="birthday_audio.mp3" type="audio/mpeg">
    </audio>

    <script>
        // 核心配置（改这里）
        const config = {
            name: "林杰同学",       // 名字
            birthday: "2027-3-20",   // （年-月-日）
            bgMusicVolume: 0.5,       // 背景音乐音量（0-1）
            audioVolume: 1.0,         // 录音音量（0-1）
            fireworksRate: 0.15,      // 烟花密度（越大越多）
            //   新增：装饰元素配置
            balloonCount: 20,          // 气球数量
            confettiCount: 50         // 彩屑数量
        };

        // 获取页面元素
        const playTip = document.getElementById('playTip');
        const birthdayContent = document.getElementById('birthdayContent');
        const nameTitle = document.getElementById('nameTitle');
        const backgroundMusic = document.getElementById('backgroundMusic');
        const birthdayAudio = document.getElementById('birthdayAudio');

        // 设置音量
        backgroundMusic.volume = config.bgMusicVolume;
        birthdayAudio.volume = config.audioVolume;

        // 初始化名字
        nameTitle.textContent = `${config.name} 生日快乐！`;

        //   新增：创建漂浮气球
        function createBalloons() {
            const balloonColors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#feca57', '#ff9ff3', '#54a0ff', '#5f27cd'];
            for (let i = 0; i < config.balloonCount; i++) {
                const balloon = document.createElement('div');
                balloon.className = 'balloon';
                balloon.style.setProperty('--balloon-color', balloonColors[i % balloonColors.length]);
                balloon.style.left = `${Math.random() * 90 + 5}%`;
                balloon.style.bottom = `${Math.random() * 80 + 10}%`;
                balloon.style.animationDuration = `${Math.random() * 8 + 6}s`;
                balloon.style.animationDelay = `${Math.random() * 5}s`;
                balloon.style.zIndex = 2;
                document.body.appendChild(balloon);
            }
        }

        // 创建彩屑飘落效果
        function createConfetti() {
            const confettiColors = ['#ff4081', '#ffeb3b', '#4caf50', '#2196f3', '#9c27b0', '#ff9800', '#f44336', '#e91e63'];
            for (let i = 0; i < config.confettiCount; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.setProperty('--color', confettiColors[Math.floor(Math.random() * confettiColors.length)]);
                confetti.style.left = `${Math.random() * 100}%`;
                confetti.style.top = `${Math.random() * -100}px`;
                confetti.style.animationDuration = `${Math.random() * 10 + 5}s`;
                confetti.style.animationDelay = `${Math.random() * 10}s`;
                confetti.style.width = `${Math.random() * 10 + 5}px`;
                confetti.style.height = `${Math.random() * 10 + 5}px`;
                document.body.appendChild(confetti);
            }
        }

        // 点击屏幕触发所有效果（解决浏览器自动播放限制）
        document.body.addEventListener('click', function () {
            // 隐藏提示层，显示主内容
            playTip.style.display = 'none';
            birthdayContent.style.display = 'block';
            setTimeout(() => {
                birthdayContent.style.opacity = '1';
            }, 100);

            //   创建气球和彩屑、烟花
            createBalloons();
            createConfetti();
            initFireworks();

            // 播放背景音乐（循环）
            try {
                backgroundMusic.play();
            } catch (err) {
                console.log('背景音乐播放提示：', err.message);
            }

            // 延迟播放录音（避免和背景音乐重叠）
            setTimeout(() => {
                try {
                    birthdayAudio.play();
                } catch (err) {
                    alert('录音播放失败，请检查文件是否命名为 birthday_audio.mp3');
                }
            }, 600);

            // 启动烟花动画
            initFireworks();

            // 只触发一次点击事件
            this.removeEventListener('click', arguments.callee);
        });

        // 生日倒计时功能
        function updateCountdown() {
            const birthdayDate = new Date(config.birthday);
            const now = new Date();
            const timeDiff = birthdayDate - now;

            if (timeDiff <= 0) {
                document.getElementById('countdownText').innerText = '🎉 今天就是你的生日啦！🎉';
                return;
            }

            // 计算天/时/分/秒
            const days = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((timeDiff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeDiff % (1000 * 60)) / 1000);

            document.getElementById('countdownText').innerText =
                `距离生日还有：${days} 天 ${hours} 时 ${minutes} 分 ${seconds} 秒`;
        }

        // 烟花动画功能
        function initFireworks() {
            const canvas = document.getElementById('fireworks');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // 随机数工具
            function random(min, max) {
                return Math.random() * (max - min) + min;
            }

            // 烟花粒子类
            class Particle {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    this.speed = random(1, 5);
                    this.angle = random(0, Math.PI * 2);
                    this.gravity = 0.05;
                    this.vx = Math.cos(this.angle) * this.speed;
                    this.vy = Math.sin(this.angle) * this.speed;
                    this.alpha = 1;
                    this.decay = random(0.005, 0.01);
                    this.color = `hsl(${random(0, 360)}, 100%, 50%)`;
                }

                update() {
                    this.vy += this.gravity;
                    this.x += this.vx;
                    this.y += this.vy;
                    this.alpha -= this.decay;
                }

                draw() {
                    ctx.save();
                    ctx.globalAlpha = this.alpha;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                    ctx.restore();
                }
            }

            let particles = [];

            // 创建烟花
            function createFirework() {
                const x = random(50, canvas.width - 50);
                const y = random(50, canvas.height - 50);
                for (let i = 0; i < 100; i++) {
                    particles.push(new Particle(x, y));
                }
            }

            // 动画循环
            function animate() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // 更新并绘制粒子，移除透明的粒子
                particles = particles.filter(particle => {
                    particle.update();
                    particle.draw();
                    return particle.alpha > 0;
                });

                // 随机生成烟花
                if (Math.random() < config.fireworksRate) {
                    createFirework();
                }

                requestAnimationFrame(animate);
            }

            animate();

            // 窗口大小变化时重置画布
            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }

        // 每秒更新倒计时
        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>

</html>
